<!DOCTYPE html>
<html>
<body>

<script>
const contarLetraA = (texto) => {
    let contador = 0;

    for (let i = 0; i < texto.length; i++) {
        if (texto[i] === 'a' || texto[i] === 'A') {
            contador++;
        }
    }

    return contador;
};

let palabra = prompt("Ingresá un texto:");
let resultado = contarLetraA(palabra);

document.write(`Cantidad de letras 'a': ${resultado}`);
</script>

</body>
</html>
