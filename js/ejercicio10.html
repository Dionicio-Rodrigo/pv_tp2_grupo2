<!DOCTYPE html>
<html>
<body>

<script>
let cantidad = parseInt(prompt("¿Cuántos números querés ingresar?"));
let numeros = [];
let suma = 0;

for (let i = 0; i < cantidad; i++) {
    let num = parseInt(prompt("Ingresá un número:"));
    numeros.push(num);
    suma += num;
}

let promedio = suma / cantidad;

document.write(`Números: ${numeros} <br>`);
document.write(`Promedio: ${promedio}`);
</script>

</body>
</html>
