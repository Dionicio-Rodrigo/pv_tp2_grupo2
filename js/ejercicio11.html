<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejercicio 11</title>
  </head>
  <body>
    <script>
      let kilometros = 0;
      do {
        kilometros = parseFloat(
          prompt(`Ingrese la cantidad de kilometros recorrido:`, ``),
        );
      } while (kilometros <= 0);
      let litros = parseFloat(prompt(`Cuantos litros utilizo su auto: `, ``));

      document.write(
        `Consumo por kilometro: ${(litros / kilometros).toFixed(2)}`,
      );
    </script>
  </body>
</html>
